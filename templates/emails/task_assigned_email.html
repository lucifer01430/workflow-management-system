{% extends "emails/base_email.html" %}

{% block body %}
<p style="margin:0 0 18px;font-size:15px;line-height:1.8;color:#526075;">A task has been assigned to you in the workflow system.</p>
<div style="padding:18px 20px;border:1px solid rgba(15,23,42,0.08);border-radius:18px;background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%);">
    <div style="font-size:13px;letter-spacing:0.08em;text-transform:uppercase;color:#64748b;font-weight:700;">Assigned task</div>
    <div style="margin-top:10px;color:#0f172a;line-height:1.8;"><strong>Task:</strong> {{ task.title }}</div>
    <div style="color:#0f172a;line-height:1.8;"><strong>Priority:</strong> {{ task.get_priority_display }}</div>
    <div style="color:#0f172a;line-height:1.8;"><strong>Department:</strong> {{ task.department|default:"-" }}</div>
    <div style="color:#0f172a;line-height:1.8;"><strong>Due Date:</strong> {{ task.due_date|default:"-" }}</div>
</div>
{% endblock %}
