{% extends "emails/base_email.html" %}

{% block body %}
<p style="margin:0 0 18px;font-size:15px;line-height:1.8;color:#526075;">Use the one-time password below to complete your email verification.</p>
<div style="margin:20px 0;padding:22px;border:1px solid rgba(15,23,42,0.08);border-radius:20px;background:
    radial-gradient(circle at top right, rgba(29,78,216,0.08), transparent 28%),
    linear-gradient(180deg,#ffffff 0%,#f8fbff 100%);
    text-align:center;">
    <div style="font-size:12px;letter-spacing:0.08em;text-transform:uppercase;color:#64748b;font-weight:700;">Your OTP</div>
    <div style="font-size:36px;font-weight:700;letter-spacing:0.18em;color:#0f172a;margin-top:10px;">{{ otp }}</div>
</div>
<p style="margin:0;font-size:14px;line-height:1.8;color:#0f172a;">This OTP is valid for {{ expires_in_minutes }} minutes.</p>
<p style="margin:14px 0 0;font-size:14px;line-height:1.8;color:#526075;">{{ support_note }}</p>
{% endblock %}
