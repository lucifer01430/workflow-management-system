{% extends "emails/base_email.html" %}

{% block body %}
<p style="margin:0 0 18px;font-size:15px;line-height:1.8;color:#526075;">Your account request could not be approved.</p>
<div style="padding:18px 20px;border:1px solid rgba(185,28,28,0.12);border-radius:18px;background:linear-gradient(180deg,#ffffff 0%,#fff7f7 100%);">
    <div style="font-size:13px;letter-spacing:0.08em;text-transform:uppercase;color:#b91c1c;font-weight:700;">Account update</div>
    <div style="margin-top:10px;color:#0f172a;line-height:1.8;"><strong>Email:</strong> {{ email }}</div>
    <div style="color:#0f172a;line-height:1.8;"><strong>Reason:</strong> {{ rejection_reason|default:"No reason provided" }}</div>
</div>
{% endblock %}
