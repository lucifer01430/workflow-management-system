<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Workflow Management System{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">WMS</a>
            <div>
                {% if request.user.is_authenticated %}
                <a href="{% url 'dashboard:home' %}" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
                <a href="{% url 'accounts:logout' %}" class="btn btn-warning btn-sm">Logout</a>
                {% else %}
                <a href="{% url 'accounts:register' %}" class="btn btn-outline-light btn-sm me-2">Register</a>
                <a href="{% url 'accounts:login' %}" class="btn btn-warning btn-sm">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
