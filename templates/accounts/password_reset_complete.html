{% extends "base/public_base.html" %}

{% block title %}Password Updated | Workflow Management System{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center py-lg-4">
    <div class="col-lg-5 col-md-7">
        <div class="card auth-card">
            <div class="card-header">
                <h1 class="h4 mb-1">Password reset complete</h1>
                <p class="text-muted mb-0">Your password has been updated successfully.</p>
            </div>
            <div class="card-body">
                <div class="alert alert-success mb-4">
                    You can now sign in using your new password.
                </div>
                <a href="{% url 'accounts:login' %}" class="btn btn-brand w-100">Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
